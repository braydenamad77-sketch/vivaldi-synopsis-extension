<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vivaldi Synopsis</title>
  </head>
  <body>
    <main class="popup">
      <header class="masthead">
        <div class="brand">
          <img class="brand-mark" src="/icon-48.png" alt="" />
          <div class="brand-copy">
            <p class="brand-name">Vivaldi Synopsis</p>
            <h1>Search this page</h1>
          </div>
        </div>
        <p class="sub">Highlight a title and open a spoiler-safe synopsis from the current tab.</p>
      </header>

      <section class="section">
        <p class="section-title">Manual search key</p>
        <div class="shortcut-row">
          <p id="shortcutValue" class="shortcut-value">Backslash (\)</p>
        </div>
        <p class="note">Use it when a page does not expose the title cleanly.</p>
      </section>

      <label class="section toggle-row" for="debugMode">
        <span class="toggle-copy">
          <span class="section-title">Debug mode</span>
          <span class="note">Keeps the side panel open and records raw model input and output.</span>
        </span>
        <span class="switch">
          <input id="debugMode" type="checkbox" />
          <span class="switch-ui" aria-hidden="true"></span>
        </span>
      </label>

      <div id="popupStatus" class="status" data-tone="empty" role="status" aria-live="polite"></div>

      <div class="actions">
        <button id="searchBtn" type="button">Search This Page</button>
        <button id="optionsBtn" type="button" class="ghost">Settings</button>
      </div>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
