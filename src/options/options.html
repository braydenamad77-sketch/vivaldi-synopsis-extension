<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vivaldi Synopsis Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Vivaldi Synopsis Extension</h1>
      <p class="sub">Configure providers, shortcut behavior, and fallback mode.</p>

      <section class="group">
        <h2>Setup Notes</h2>
        <div id="settingsSummary" class="summary" role="status" aria-live="polite"></div>
      </section>

      <section class="group">
        <h2>API Keys</h2>
        <label>
          OpenRouter API Key
          <input id="openrouterApiKey" type="password" autocomplete="off" />
          <span class="hint">This is the main path for synopsis writing. Provider text is only the fallback.</span>
        </label>
        <label>
          OpenRouter Model
          <input id="openrouterModel" type="text" autocomplete="off" />
          <span class="hint">Leave this alone unless you already know you want a different OpenRouter model.</span>
        </label>
        <label>
          TMDB API Key
          <input id="tmdbApiKey" type="password" autocomplete="off" />
          <span class="hint">Needed for stronger movie and TV matching plus artwork.</span>
        </label>
      </section>

      <section class="group">
        <h2>Shortcut</h2>
        <label>
          Manual Search Shortcut
          <div class="shortcut-row">
            <input id="searchShortcutKey" class="shortcut-input" type="text" readonly aria-describedby="shortcutHint" />
            <button id="resetShortcutBtn" type="button" class="ghost small">Reset</button>
          </div>
          <span id="shortcutHint" class="hint">Click the field, then press one key. Default: backslash. No modifier keys.</span>
        </label>
      </section>

      <section class="group">
        <h2>Behavior</h2>
        <div class="mode-group" role="radiogroup" aria-label="Result display mode">
          <p class="mode-title">Result Display Mode</p>
          <label class="mode-option"><input id="resultUiModePanel" type="radio" name="resultUiMode" value="with_image" /> With Image Panel</label>
          <label class="mode-option"><input id="resultUiModeCompact" type="radio" name="resultUiMode" value="without_image" /> Without Image</label>
        </div>
        <label class="check"><input id="llmEnabled" type="checkbox" /> Enable AI synopsis writing</label>
        <label class="check"><input id="llmPreferred" type="checkbox" /> Prefer AI when provider text is available</label>
        <label class="check"><input id="localOnlyMode" type="checkbox" /> Local-only mode (only return cached matches)</label>
      </section>

      <section class="group">
        <h2>Goodreads Visual Fallback</h2>
        <label class="check"><input id="goodreadsVisualFallbackEnabled" type="checkbox" /> Enable Goodreads visual fallback for books</label>
        <label>
          Local Helper URL
          <input id="goodreadsHelperUrl" type="text" autocomplete="off" />
          <span class="hint">Default: http://127.0.0.1:4317. This must stay on localhost and uses your saved OpenRouter key to read Goodreads screenshots.</span>
        </label>
      </section>

      <section class="group">
        <h2>Providers</h2>
        <label class="check"><input id="providerOpenLibrary" type="checkbox" /> Open Library (books)</label>
        <label class="check"><input id="providerTmdb" type="checkbox" /> TMDB (movies/TV)</label>
        <label class="check"><input id="providerWikipedia" type="checkbox" /> Wikipedia fallback (movies/TV only)</label>
      </section>

      <div class="actions">
        <button id="saveBtn" type="button">Save Settings</button>
        <button id="clearCacheBtn" type="button" class="ghost">Delete Cached Data</button>
      </div>

      <p id="status" class="status" role="status"></p>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
